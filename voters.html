<!DOCTYPE html>
<html>
<head>
    <title>Voter Registration Form</title>
    <style>
        body {
            font-family: TimesNewRoman;
            background: black;
        }
        .container {
            width: 400px;
            margin: 30px auto;
            background:white;
            padding: 20px;
            border-radius: 6px;
            box-shadow: 10px 10px 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
        }
        label {
            display: block;
            margin-top: 10px;
        }
        input, select, textarea {
            color:red; 
            width: 93%;
            padding: 8px;
            margin-top: 5px;
        }
        button {
            margin-top: 15px;
            width: 100%;
            padding: 10px;
            background: blue;
            color: white;
            border: none;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background: cyan;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Voter Registration Form</h2>
    <form action="#" method="post">

        <label>First Name</label>
        <input type="text" name="fullname" required>
        
        <label>Last Name</label>
        <input type="text" name="fullname" required>

        <label>Date of Birth</label>
        <input type="date" name="dob" required>

        <label>Gender</label>
        <select name="gender" required>
            <option value="">--Select--</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>

        <label>Country</label>
        <input type="text" name="citizenship" required>

        <label>Address</label>
        <textarea name="address" rows="3" required></textarea>

        <label>State</label>
        <input type="text" name="state" required>
        
        <label>Pincode</label>
        <input type="text" name="Pincode" required>

        <label>Voter ID / Aadhaar No</label>
        <input type="text" name="voterid" required>

        <label>Email</label>
        <input type="email" name="email">

        <label>Phone Number</label>
        <input type="tel" name="phone" required>

        <button type="submit">Register</button>

    </form>
</div>

</body>
</html>
