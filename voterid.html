<!DOCTYPE html>
<html>
<head>
<title>Voter ID Card</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
}

.card {
    width: 300px;
    height: 300px;
    background: #ffffff;
    border: 2px solid #000;
    padding: 12px;
    margin: auto;
    position: relative;
}


.header {
    text-align: center;
    font-weight: bold;
    font-size: 14px;
}

.sub-header {
    text-align: center;
    font-size: 12px;
    margin-bottom: 8px;
}

.tricolor {
    height: 5px;
    background: linear-gradient(to right, orange, white, green);
    margin: 6px 0;
}

.photo {
    width: 80px;
    height: 100px;
    border: 1px solid #000;
    text-align: center;
    line-height: 100px;
    font-size: 11px;
    float: right;
}

.details p {
    font-size: 12px;
    margin: 4px 0;
}

.clear {
    clear: both;
}

.footer {
    font-size: 10px;
    text-align: center;
    margin-top: 6px;
}
</style>
</head>

<body>

<div class="card">
    <div class="header">ELECTION COMMISSION OF INDIA</div>
    <div class="sub-header">VOTER IDENTITY CARD</div>

    <div class="tricolor"></div>

    <div class="photo">PHOTO</div>

    <div class="details">
        <p><strong>Name:</strong> Rahul Sharma</p>
        <p><strong>Father's Name:</strong> Mohan Sharma</p>
        <p><strong>Date of Birth:</strong> 12-05-1998</p>
        <p><strong>Gender:</strong> Male</p>
        <p><strong>Voter ID No:</strong> DEMO123456</p>
    </div>

    <div class="clear"></div>
</div>

</body>
</html>
